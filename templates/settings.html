<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet"
href="../static/css/common.css">

<link rel="stylesheet"
href="../static/css/dashboard.css">

<link rel="stylesheet"
href="../static/css/settings.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="settings-container">

<h1>

Settings

</h1>

<div class="setting-card">

<h3>

Account

</h3>

<button>

Edit Profile

</button>

<button>

Change Password

</button>

</div>

<div class="setting-card">

<h3>

Notifications

</h3>

<label>

<input type="checkbox" checked>

Email Notifications

</label>

<br><br>

<label>

<input type="checkbox">

SMS Notifications

</label>

</div>

<div class="setting-card">

<h3>

Appearance

</h3>

<label>

<input type="checkbox" id="darkMode">

Enable Dark Mode

</label>

</div>

<div class="setting-card">

<h3>

Privacy

</h3>

<label>

<input type="checkbox">

Hide Profile

</label>

</div>

<div class="buttons">

<button id="logoutBtn">

Logout

</button>

<a href="leader-dashboard.html">

Dashboard

</a>

</div>

</div>

<div id="toast">

Settings Saved

</div>

<script src="../static/js/common.js"></script>

<script src="../static/js/settings.js"></script>

</body>

</html>
