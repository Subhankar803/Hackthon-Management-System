<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet" href="../static/css/common.css">
<link rel="stylesheet" href="../static/css/dashboard.css">
<link rel="stylesheet" href="../static/css/profile.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="profile-container">

<div class="profile-card">

<div class="profile-header">

<img src="../static/images/profile.png" alt="Profile">

<h2 id="userName">Subhankar Goswami</h2>

<p id="userRole">Team Leader</p>

</div>

<div class="profile-body">

<div class="row">

<label>Username</label>

<p id="username">@subhankar</p>

</div>

<div class="row">

<label>Email</label>

<p id="email">subhankar@example.com</p>

</div>

<div class="row">

<label>Phone</label>

<p id="phone">+91 9876543210</p>

</div>

<div class="row">

<label>Team</label>

<p id="team">Mind Hackers</p>

</div>

<div class="row">

<label>College</label>

<p id="college">JIS College of Engineering</p>

</div>

</div>

<div class="buttons">

<button id="editBtn">

<i class="fa-solid fa-user-pen"></i>

Edit Profile

</button>

<button id="passwordBtn">

<i class="fa-solid fa-key"></i>

Change Password

</button>

<a href="leader-dashboard.html" class="backBtn">

<i class="fa-solid fa-arrow-left"></i>

Dashboard

</a>

</div>

</div>

</div>

<script src="../static/js/common.js"></script>

<script src="../static/js/profile.js"></script>

</body>

</html>
